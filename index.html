<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Foundation</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .logo {
            width: 150px;
            height: 150px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
            transition: filter 0.5s ease;
        }
        .logo:hover {
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.8));
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-top: 30px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }
        p {
            color: #666;
            font-style: italic;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        a {
            margin-top: 40px;
            color: #fff;
            text-decoration: none;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="200" height="200" fill="#000000"/>
  
    <path d="M60 140 L100 60 L140 140" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
    
    <h1>Aether Foundation</h1>
    <p>Engineering the medium. Sustaining the foundation.</p>
    
    <a href="https://github.com/Aether-Foundation">ENTER REPOSITORY</a>
</body>
</html>
